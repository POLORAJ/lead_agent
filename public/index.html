<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebNest Lead Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .lead-card { animation: fadeIn 0.3s ease; }
    tr { animation: fadeIn 0.3s ease; }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }
    .source-tag { font-size:.65rem; background:#1e3a5f; color:#93c5fd; border:1px solid #1d4ed8; border-radius:4px; padding:1px 6px; white-space:nowrap; }
    select, input[type="text"], input[type="number"] { -webkit-appearance: none; appearance: none; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="border-b border-gray-800 bg-gray-900 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-sm shrink-0">W</div>
    <div class="min-w-0">
      <h1 class="font-semibold text-white text-base leading-none truncate">WebNest Lead Agent</h1>
      <p class="text-xs text-gray-400 mt-0.5">AI-powered business lead finder</p>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-8">

    <!-- Search Form -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 sm:p-6 mb-4 sm:mb-6">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 sm:mb-4">Search Parameters</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Business Niche</label>
          <select id="businessType" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-3 text-sm text-white focus:outline-none focus:border-blue-500">
            <option>Dental Clinics</option>
            <option>Gyms</option>
            <option>Restaurants</option>
            <option>Cafes</option>
            <option>Salons</option>
            <option>Coaching Centers</option>
            <option>Hospitals</option>
            <option>Pharmacies</option>
            <option>Hotels</option>
            <option>Spas</option>
          </select>
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Location</label>
          <input id="location" type="text" value="Guwahati, Assam"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"
            placeholder="e.g. Guwahati, Assam" />
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Max Leads</label>
          <input id="maxLeads" type="number" value="20" min="1" max="100"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-3 text-sm text-white focus:outline-none focus:border-blue-500" />
        </div>

        <!-- Action buttons -->
        <div class="flex gap-2 sm:items-end">
          <button onclick="startSearch()" id="searchBtn"
            class="flex-1 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-lg px-4 py-3 text-sm transition-colors flex items-center justify-center gap-2">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            Search
          </button>
          <button onclick="stopSearch()" id="stopBtn"
            class="hidden bg-red-600 hover:bg-red-500 active:bg-red-700 text-white font-semibold rounded-lg px-4 py-3 text-sm transition-colors flex items-center justify-center gap-2">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            Stop
          </button>
          <button onclick="downloadCSV()" id="downloadBtn" disabled
            class="bg-gray-700 hover:bg-gray-600 active:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold rounded-lg px-3 py-3 text-sm transition-colors flex items-center justify-center gap-1.5 shrink-0">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            <span class="hidden sm:inline">CSV</span>
          </button>
        </div>
      </div>

      <!-- Status bar -->
      <div id="statusBar" class="hidden mt-3 flex items-center gap-2.5 bg-gray-800/60 rounded-xl px-3 py-2.5">
        <div id="spinner" class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin hidden shrink-0"></div>
        <p id="statusMsg" class="text-xs sm:text-sm text-gray-300 leading-snug"></p>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats" class="hidden grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-4 mb-4 sm:mb-6">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-3 sm:p-4">
        <p class="text-xs text-gray-500 mb-1">Total</p>
        <p id="statTotal" class="text-xl sm:text-2xl font-bold text-white">0</p>
      </div>
      <div class="bg-gray-900 border border-red-900/40 rounded-xl p-3 sm:p-4">
        <p class="text-xs text-gray-500 mb-1">🔥 Hot</p>
        <p id="statHot" class="text-xl sm:text-2xl font-bold text-red-400">0</p>
      </div>
      <div class="bg-gray-900 border border-yellow-900/40 rounded-xl p-3 sm:p-4">
        <p class="text-xs text-gray-500 mb-1">🟡 Medium</p>
        <p id="statMed" class="text-xl sm:text-2xl font-bold text-yellow-400">0</p>
      </div>
      <div class="bg-gray-900 border border-green-900/40 rounded-xl p-3 sm:p-4">
        <p class="text-xs text-gray-500 mb-1">🟢 Low</p>
        <p id="statLow" class="text-xl sm:text-2xl font-bold text-green-400">0</p>
      </div>
    </div>

    <!-- Filter bar -->
    <div id="filterBar" class="hidden mb-3 sm:mb-4 space-y-2">
      <div class="flex flex-wrap gap-2">
        <button onclick="filterLeads('ALL')"         class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium border border-blue-500 text-blue-400 transition-colors">All</button>
        <button onclick="filterLeads('HOT LEAD')"    class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium border border-gray-600 text-gray-300 hover:border-red-500 hover:text-red-400 transition-colors">🔥 Hot</button>
        <button onclick="filterLeads('MEDIUM LEAD')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium border border-gray-600 text-gray-300 hover:border-yellow-500 hover:text-yellow-400 transition-colors">🟡 Medium</button>
        <button onclick="filterLeads('LOW LEAD')"    class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium border border-gray-600 text-gray-300 hover:border-green-500 hover:text-green-400 transition-colors">🟢 Low</button>
      </div>
      <input id="searchFilter" oninput="filterLeads()" placeholder="🔎 Filter by business name..."
        class="w-full sm:w-64 bg-gray-800 border border-gray-700 rounded-full px-3 py-1.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-blue-500" />
    </div>

    <!-- Mobile Cards (visible on small screens) -->
    <div id="cardsWrap" class="hidden sm:hidden space-y-3 mb-4"></div>

    <!-- Desktop Table (hidden on small screens) -->
    <div id="tableWrap" class="hidden bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-800 text-xs text-gray-500 uppercase tracking-wider">
              <th class="text-left px-4 py-3">#</th>
              <th class="text-left px-4 py-3">Business</th>
              <th class="text-left px-4 py-3">Phone</th>
              <th class="text-left px-4 py-3">Address</th>
              <th class="text-left px-4 py-3">Website</th>
              <th class="text-left px-4 py-3">Socials</th>
              <th class="text-left px-4 py-3">Source</th>
              <th class="text-left px-4 py-3">Score</th>
            </tr>
          </thead>
          <tbody id="leadsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-16 text-gray-600">
      <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <p class="text-sm">No leads found. Try a different niche or location.</p>
    </div>

  </main>

<script>
  let allLeads = [];
  let activeFilter = 'ALL';
  let es = null;
  let searchDone = false;

  const isMobile = () => window.innerWidth < 640;

  function startSearch() {
    const bt  = document.getElementById('businessType').value;
    const loc = document.getElementById('location').value.trim();
    const max = parseInt(document.getElementById('maxLeads').value) || 20;
    if (!loc) return alert('Please enter a location.');

    allLeads = [];
    searchDone = false;
    document.getElementById('leadsTable').innerHTML = '';
    document.getElementById('cardsWrap').innerHTML = '';
    ['tableWrap','cardsWrap','emptyState','stats','filterBar'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById('downloadBtn').disabled = true;
    document.getElementById('stopBtn').classList.remove('hidden');
    document.getElementById('searchBtn').classList.add('hidden');
    setStats(0,0,0,0);
    document.getElementById('statusBar').classList.remove('hidden');
    document.getElementById('spinner').classList.remove('hidden');
    setStatus(`Searching ${bt} in ${loc}...`);

    if (es) es.close();
    es = new EventSource(`/search?business_type=${encodeURIComponent(bt)}&location=${encodeURIComponent(loc)}&max_leads=${max}`);

    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'status') {
        setStatus(msg.msg);
      } else if (msg.type === 'error') {
        setStatus(`⚠️ ${msg.msg}`);
      } else if (msg.type === 'lead') {
        allLeads.push(msg.data);
        appendRow(msg.data, allLeads.length);
        appendCard(msg.data, allLeads.length);
        if (isMobile()) {
          document.getElementById('cardsWrap').classList.remove('hidden');
        } else {
          document.getElementById('tableWrap').classList.remove('hidden');
        }
        ['stats','filterBar'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        updateStats();
      } else if (msg.type === 'done') {
        searchDone = true;
        es.close();
        finishSearch(`✅ Done! Found ${msg.total} leads.`);
        document.getElementById('downloadBtn').disabled = false;
        if (!allLeads.length) document.getElementById('emptyState').classList.remove('hidden');
      }
    };

    es.onerror = () => {
      if (searchDone) return;
      es.close();
      finishSearch('⚠️ Connection error. Please try again.');
      document.getElementById('downloadBtn').disabled = allLeads.length === 0;
    };
  }

  function finishSearch(msg) {
    document.getElementById('spinner').classList.add('hidden');
    document.getElementById('stopBtn').classList.add('hidden');
    document.getElementById('searchBtn').classList.remove('hidden');
    setStatus(msg);
  }

  function stopSearch() {
    if (!es) return;
    searchDone = true;
    es.close();
    finishSearch(`🛑 Stopped. Found ${allLeads.length} leads so far.`);
    document.getElementById('downloadBtn').disabled = allLeads.length === 0;
    if (!allLeads.length) document.getElementById('emptyState').classList.remove('hidden');
  }

  // Desktop table row
  function appendRow(lead, idx) {
    const score = lead.leadScore || '';
    const badgeClass = score === 'HOT LEAD'
      ? 'bg-red-900/40 text-red-400 border-red-800'
      : score === 'MEDIUM LEAD'
      ? 'bg-yellow-900/40 text-yellow-400 border-yellow-800'
      : 'bg-green-900/40 text-green-400 border-green-800';

    const website = lead.website
      ? `<a href="${lead.website}" target="_blank" class="text-blue-400 hover:underline truncate max-w-[120px] block">${lead.website.replace(/https?:\/\/(www\.)?/,'').split('/')[0]}</a>`
      : `<span class="text-gray-600 text-xs">—</span>`;

    const socials = [
      lead.instagram ? `<a href="${lead.instagram}" target="_blank" class="text-pink-400 hover:text-pink-300 text-xs">IG</a>` : '',
      lead.facebook  ? `<a href="${lead.facebook}"  target="_blank" class="text-blue-400 hover:text-blue-300 text-xs">FB</a>` : '',
      lead.linkedin  ? `<a href="${lead.linkedin}"  target="_blank" class="text-sky-400 hover:text-sky-300 text-xs">LI</a>`  : '',
    ].filter(Boolean).join(' ');

    const mapsLink = lead.googleMapsLink
      ? `<a href="${lead.googleMapsLink}" target="_blank" class="text-gray-400 hover:text-white text-xs underline">${(lead.address||'').substring(0,28)||'View'}</a>`
      : `<span class="text-gray-600 text-xs">${(lead.address||'').substring(0,28)||'—'}</span>`;

    const tr = document.createElement('tr');
    tr.dataset.score = score;
    tr.dataset.name  = (lead.businessName||'').toLowerCase();
    tr.className = 'border-b border-gray-800/60 hover:bg-gray-800/40 transition-colors';
    tr.innerHTML = `
      <td class="px-4 py-3 text-gray-500 text-xs">${idx}</td>
      <td class="px-4 py-3">
        <p class="font-medium text-white text-sm">${lead.businessName||'—'}</p>
        <p class="text-xs text-gray-500 mt-0.5">${lead.reason||''}</p>
      </td>
      <td class="px-4 py-3 text-gray-300 text-xs whitespace-nowrap">${lead.phone||'<span class="text-gray-600">—</span>'}</td>
      <td class="px-4 py-3 text-gray-400 text-xs max-w-[160px]">${mapsLink}</td>
      <td class="px-4 py-3">${website}</td>
      <td class="px-4 py-3"><div class="flex gap-1.5 items-center">${socials||'<span class="text-gray-600 text-xs">—</span>'}</div></td>
      <td class="px-4 py-3"><span class="source-tag">${lead.source||'—'}</span></td>
      <td class="px-4 py-3"><span class="text-xs font-semibold px-2 py-1 rounded-full border ${badgeClass}">${score}</span></td>
    `;
    document.getElementById('leadsTable').appendChild(tr);
  }

  // Mobile card
  function appendCard(lead, idx) {
    const score = lead.leadScore || '';
    const badgeClass = score === 'HOT LEAD'
      ? 'bg-red-900/40 text-red-400 border-red-800'
      : score === 'MEDIUM LEAD'
      ? 'bg-yellow-900/40 text-yellow-400 border-yellow-800'
      : 'bg-green-900/40 text-green-400 border-green-800';

    const socials = [
      lead.instagram ? `<a href="${lead.instagram}" target="_blank" class="text-pink-400 text-xs font-medium">Instagram</a>` : '',
      lead.facebook  ? `<a href="${lead.facebook}"  target="_blank" class="text-blue-400 text-xs font-medium">Facebook</a>`  : '',
      lead.linkedin  ? `<a href="${lead.linkedin}"  target="_blank" class="text-sky-400 text-xs font-medium">LinkedIn</a>`   : '',
    ].filter(Boolean).join('<span class="text-gray-700 mx-1">·</span>');

    const card = document.createElement('div');
    card.dataset.score = score;
    card.dataset.name  = (lead.businessName||'').toLowerCase();
    card.className = 'lead-card bg-gray-900 border border-gray-800 rounded-xl p-4';
    card.innerHTML = `
      <div class="flex items-start justify-between gap-2 mb-2">
        <div class="min-w-0">
          <p class="font-semibold text-white text-sm leading-snug">${lead.businessName||'—'}</p>
          <p class="text-xs text-gray-500 mt-0.5">${lead.reason||''}</p>
        </div>
        <span class="text-xs font-semibold px-2 py-1 rounded-full border shrink-0 ${badgeClass}">${score.replace(' LEAD','')}</span>
      </div>
      <div class="space-y-1.5 text-xs">
        ${lead.phone ? `<div class="flex items-center gap-2"><span class="text-gray-500 w-14 shrink-0">Phone</span><a href="tel:${lead.phone}" class="text-green-400 font-medium">${lead.phone}</a></div>` : ''}
        ${lead.address ? `<div class="flex items-start gap-2"><span class="text-gray-500 w-14 shrink-0">Address</span><span class="text-gray-300">${lead.address}</span></div>` : ''}
        ${lead.website ? `<div class="flex items-center gap-2"><span class="text-gray-500 w-14 shrink-0">Website</span><a href="${lead.website}" target="_blank" class="text-blue-400 truncate">${lead.website.replace(/https?:\/\/(www\.)?/,'').split('/')[0]}</a></div>` : ''}
        ${socials ? `<div class="flex items-center gap-2"><span class="text-gray-500 w-14 shrink-0">Socials</span><div class="flex gap-1">${socials}</div></div>` : ''}
        <div class="flex items-center gap-2 pt-1 border-t border-gray-800 mt-2">
          <span class="source-tag">${lead.source||'—'}</span>
          ${lead.googleMapsLink ? `<a href="${lead.googleMapsLink}" target="_blank" class="text-gray-400 hover:text-white underline ml-auto">View on Map</a>` : ''}
        </div>
      </div>
    `;
    document.getElementById('cardsWrap').appendChild(card);
  }

  // Show correct view on resize
  window.addEventListener('resize', () => {
    if (!allLeads.length) return;
    if (isMobile()) {
      document.getElementById('tableWrap').classList.add('hidden');
      document.getElementById('cardsWrap').classList.remove('hidden');
    } else {
      document.getElementById('cardsWrap').classList.add('hidden');
      document.getElementById('tableWrap').classList.remove('hidden');
    }
  });

  function filterLeads(score) {
    if (score) {
      activeFilter = score;
      const labelMap = { ALL: 'All', 'HOT LEAD': '🔥 Hot', 'MEDIUM LEAD': '🟡 Medium', 'LOW LEAD': '🟢 Low' };
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const active = btn.textContent.trim() === labelMap[score];
        btn.classList.toggle('border-blue-500', active);
        btn.classList.toggle('text-blue-400', active);
        btn.classList.toggle('border-gray-600', !active);
        btn.classList.toggle('text-gray-300', !active);
      });
    }
    const query = document.getElementById('searchFilter').value.toLowerCase();
    // filter table rows
    document.querySelectorAll('#leadsTable tr').forEach(tr => {
      tr.style.display = (activeFilter === 'ALL' || tr.dataset.score === activeFilter) && (!query || tr.dataset.name.includes(query)) ? '' : 'none';
    });
    // filter cards
    document.querySelectorAll('#cardsWrap > div').forEach(card => {
      card.style.display = (activeFilter === 'ALL' || card.dataset.score === activeFilter) && (!query || card.dataset.name.includes(query)) ? '' : 'none';
    });
  }

  function updateStats() {
    const hot = allLeads.filter(l => l.leadScore === 'HOT LEAD').length;
    const med = allLeads.filter(l => l.leadScore === 'MEDIUM LEAD').length;
    const low = allLeads.filter(l => l.leadScore === 'LOW LEAD').length;
    setStats(allLeads.length, hot, med, low);
  }

  function setStats(t,h,m,l) {
    document.getElementById('statTotal').textContent = t;
    document.getElementById('statHot').textContent   = h;
    document.getElementById('statMed').textContent   = m;
    document.getElementById('statLow').textContent   = l;
  }

  function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }

  async function downloadCSV() {
    const bt  = document.getElementById('businessType').value;
    const loc = document.getElementById('location').value.trim();
    const max = parseInt(document.getElementById('maxLeads').value) || 20;
    const res = await fetch('/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ business_type: bt, location: loc, max_leads: max }),
    });
    if (!res.ok) return alert('Download failed.');
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `leads_${bt.replace(/ /g,'_')}_${loc.split(',')[0].trim()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
